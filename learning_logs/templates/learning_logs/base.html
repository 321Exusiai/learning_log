<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Learning Log{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.82);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --nav-bg: rgba(255, 255, 255, 0.75);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        /* Basic Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: #0f172a;
        }

        /* Navigation */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding: 1rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .logo {
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            letter-spacing: -0.04em;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
            position: relative;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        .nav-link.active {
            color: var(--primary);
        }

        .nav-btn {
            padding: 0.7rem 1.4rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            text-decoration: none;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-outline {
            border: 2px solid var(--primary);
            color: var(--primary);
            background: transparent;
        }

        .btn-outline:hover {
            background: rgba(99, 102, 241, 0.08);
            transform: translateY(-2px);
        }

        .btn-danger-text {
            color: #ef4444;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-danger-text:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* Container & Grid */
        .container {
            max-width: 1000px;
            margin: 4rem auto;
            padding: 0 2rem;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Card Component */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: var(--radius-lg);
            padding: 3rem;
            box-shadow: var(--shadow-lg);
        }

        /* Typography spacing */
        h1 {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        p {
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Forms */
        form input,
        form textarea {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-md);
            margin-top: 0.5rem;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition-smooth);
            background: rgba(255, 255, 255, 0.5);
        }

        form input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-label {
            font-weight: 700;
            color: var(--text-main);
            font-size: 0.9rem;
            display: block;
            margin-left: 2px;
        }

        /* Footer or small links */
        .small-link {
            font-size: 0.9rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .small-link:hover {
            text-decoration: underline;
        }

        /* Mobile specific */
        @media (max-width: 768px) {
            .navbar {
                padding: 1rem 2rem;
            }

            h1 {
                font-size: 2.2rem;
            }

            .container {
                margin: 2rem auto;
            }

            .card {
                padding: 2rem;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="{% url 'learning_logs:index' %}" class="logo">LearningLog.</a>

        <div class="nav-links">
            {% if user.is_authenticated %}
            <a href="{% url 'learning_logs:topics' %}" class="nav-link">My Topics</a>
            <span style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">
                User: <strong style="color: var(--text-main);">{{ user.username }}</strong>
            </span>
            <!-- ✅ 修复：把注销链接改成POST表单，样式完全保留 -->
            <form action="{% url 'accounts:logout' %}" method="post" style="display: inline; margin: 0; padding: 0;">
                {% csrf_token %}
                <button type="submit" class="btn-danger-text">Logout</button>
            </form>
            {% else %}
            <a href="{% url 'accounts:login' %}" class="nav-link">Login</a>
            <a href="{% url 'accounts:register' %}" class="nav-btn btn-primary">Get Started</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        <div class="card">
            {% block content %}{% endblock %}
        </div>
    </div>

    {% block extra_js %}{% endblock %}
</body>

</html>
